<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0a0c12" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
    <title>Punchlist - Comisionamiento PWA</title>
    
    <!-- CSS Core -->
    <link rel="stylesheet" href="/comisionamiento/css/core/variables.css">
    <link rel="stylesheet" href="/comisionamiento/css/core/reset.css">
    <link rel="stylesheet" href="/comisionamiento/css/core/utilities.css">
    
    <!-- CSS Layout -->
    <link rel="stylesheet" href="/comisionamiento/css/layout/grid.css">
    <link rel="stylesheet" href="/comisionamiento/css/layout/sidebar.css">
    <link rel="stylesheet" href="/comisionamiento/css/layout/header.css">
    
    <!-- CSS Components -->
    <link rel="stylesheet" href="/comisionamiento/css/components/buttons.css">
    <link rel="stylesheet" href="/comisionamiento/css/components/cards.css">
    <link rel="stylesheet" href="/comisionamiento/css/components/forms.css">
    <link rel="stylesheet" href="/comisionamiento/css/components/modals.css">
    <link rel="stylesheet" href="/comisionamiento/css/components/animations.css">
    
    <!-- CSS Features -->
    <link rel="stylesheet" href="/comisionamiento/css/checklist.css">
</head>
<body>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <a href="/comisionamiento/index.html" class="logo">
                <span class="logo-icon">⚡</span>
                <span class="logo-text">Comisiona</span>
            </a>
            <button class="sidebar-toggle" id="sidebarToggle" aria-label="Colapsar menú">
                <span class="toggle-icon">◀</span>
            </button>
            <button class="sidebar-close" id="sidebarClose" aria-label="Cerrar menú">✕</button>
        </div>
        
        <nav class="sidebar-nav">
            <a href="/comisionamiento/index.html" class="nav-item">
                <span class="nav-icon">📊</span>
                <span class="nav-text">Dashboard</span>
            </a>
            <a href="/comisionamiento/pages/punchlist.html" class="nav-item active">
                <span class="nav-icon">📋</span>
                <span class="nav-text">Punchlist</span>
                <span class="badge" id="punchlistBadge">0</span>
            </a>
            <a href="/comisionamiento/pages/executive-dashboard.html" class="nav-item">
                <span class="nav-icon">📈</span>
                <span class="nav-text">Ejecutivo</span>
            </a>
            <a href="/comisionamiento/pages/subcontractor.html" class="nav-item">
                <span class="nav-icon">👥</span>
                <span class="nav-text">Proveedores</span>
            </a>
        </nav>
        
        <div class="sidebar-footer">
            <button id="themeToggle" class="theme-toggle-btn">
                <span class="theme-icon-dark">🌙</span>
                <span class="theme-icon-light">☀️</span>
                <span class="theme-text">Modo oscuro</span>
            </button>
        </div>
    </aside>
    
    <main class="main-content">
        <header class="top-bar">
            <button class="hamburger" id="hamburger" aria-label="Abrir menú">
                <span></span><span></span><span></span>
            </button>
            <h1 class="page-title">Punchlist</h1>
            <div class="top-bar-actions">
                <button id="themeToggleMobile" class="mobile-theme-toggle" aria-label="Cambiar tema">🌙</button>
                <button id="addPunchlistBtn" class="btn btn-primary btn-sm">
                    <span>➕</span> Nueva observación
                </button>
            </div>
        </header>
        
        <div class="content-container">
            <!-- Filtros -->
            <div class="card mb-4">
                <div class="card-body">
                    <div class="filters-bar">
                        <select id="filterPriority" class="form-select">
                            <option value="all">Todas las prioridades</option>
                            <option value="high">🔴 Alta</option>
                            <option value="medium">🟡 Media</option>
                            <option value="low">🟢 Baja</option>
                        </select>
                        <select id="filterStatus" class="form-select">
                            <option value="all">Todos los estados</option>
                            <option value="pending">⏳ Pendiente</option>
                            <option value="in-progress">🔄 En Proceso</option>
                            <option value="resolved">✅ Resuelto</option>
                        </select>
                        <select id="filterCategory" class="form-select">
                            <option value="all">Todas las categorías</option>
                            <option value="electrical">⚡ Eléctrico</option>
                            <option value="instrumentation">📟 Instrumentación</option>
                        </select>
                    </div>
                </div>
            </div>
            
            <!-- Lista de observaciones -->
            <div id="punchlistContainer" class="punchlist-container"></div>
        </div>
    </main>
    
    <!-- Modal para agregar/editar observación -->
    <div id="punchlistModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Nueva observación</h3>
                <button class="modal-close" aria-label="Cerrar">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Categoría</label>
                    <select id="modalCategory" class="form-select">
                        <option value="electrical">⚡ Eléctrico</option>
                        <option value="instrumentation">📟 Instrumentación</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Descripción de la observación *</label>
                    <textarea id="modalText" rows="4" class="form-textarea" placeholder="Describa la observación o hallazgo..."></textarea>
                </div>
                <div class="form-group">
                    <label>Prioridad</label>
                    <select id="modalPriority" class="form-select">
                        <option value="high">🔴 Alta - Crítico, requiere atención inmediata</option>
                        <option value="medium">🟡 Media - Importante, planificar corrección</option>
                        <option value="low">🟢 Baja - Menor, puede esperar</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Responsable asignado</label>
                    <input type="text" id="modalAssigned" class="form-input" placeholder="Nombre del responsable">
                </div>
                <div class="form-group">
                    <label>Fecha compromiso</label>
                    <input type="date" id="modalDueDate" class="form-input">
                </div>
                <div class="form-group" id="statusGroup" style="display: none;">
                    <label>Estado</label>
                    <select id="modalStatus" class="form-select">
                        <option value="pending">⏳ Pendiente</option>
                        <option value="in-progress">🔄 En Proceso</option>
                        <option value="resolved">✅ Resuelto</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button id="modalCancel" class="btn btn-outline">Cancelar</button>
                <button id="modalSave" class="btn btn-primary">Guardar</button>
                <button id="modalDelete" class="btn btn-danger" style="display: none;">Eliminar</button>
            </div>
        </div>
    </div>
    
    <script type="module">
        import { initTheme, themeManager } from '/comisionamiento/js/core/theme.js';
        import { initSidebar } from '/comisionamiento/js/components/sidebar.js';
        import { initStorage, getAllPunchlistItems, addPunchlistItem, updatePunchlistItem, deletePunchlistItem, getPunchlistSummary } from '/comisionamiento/js/core/storage.js';
        import { notifications } from '/comisionamiento/js/services/notifications.js';
        import { logger } from '/comisionamiento/js/core/logger.js';
        import { formatters } from '/comisionamiento/js/utils/format.js';
        
        let currentItems = [];
        let editingId = null;
        const log = logger.setContext('Punchlist');
        
        async function loadPunchlist() {
            try {
                await initStorage();
                currentItems = await getAllPunchlistItems();
                applyFilters();
                updateBadge();
                log.info('Punchlist cargado', { total: currentItems.length });
            } catch (error) {
                log.error('Error cargando punchlist:', error);
                notifications.error('Error al cargar la lista');
            }
        }
        
        function applyFilters() {
            const priorityFilter = document.getElementById('filterPriority')?.value || 'all';
            const statusFilter = document.getElementById('filterStatus')?.value || 'all';
            const categoryFilter = document.getElementById('filterCategory')?.value || 'all';
            
            let filtered = [...currentItems];
            
            if (priorityFilter !== 'all') {
                filtered = filtered.filter(i => i.priority === priorityFilter);
            }
            if (statusFilter !== 'all') {
                filtered = filtered.filter(i => i.status === statusFilter);
            }
            if (categoryFilter !== 'all') {
                filtered = filtered.filter(i => i.category === categoryFilter);
            }
            
            renderPunchlist(filtered);
        }
        
        function renderPunchlist(items) {
            const container = document.getElementById('punchlistContainer');
            if (!container) return;
            
            if (items.length === 0) {
                container.innerHTML = `
                    <div class="card">
                        <div class="card-body text-center py-5">
                            <div class="empty-state">
                                <span class="empty-icon">📋</span>
                                <p class="text-muted mt-2">No hay observaciones registradas</p>
                                <button class="btn btn-primary btn-sm mt-3" onclick="document.getElementById('addPunchlistBtn').click()">
                                    + Crear primera observación
                                </button>
                            </div>
                        </div>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = items.map(item => `
                <div class="card punchlist-item priority-${item.priority} mb-3" data-id="${item.id}">
                    <div class="card-body">
                        <div class="punchlist-header">
                            <div class="punchlist-category">
                                <span class="badge ${item.category === 'electrical' ? 'badge-electrical' : 'badge-instrumentation'}">
                                    ${item.category === 'electrical' ? '⚡ Eléctrico' : '📟 Instrumentación'}
                                </span>
                                <span class="badge priority-${item.priority}">
                                    ${item.priority === 'high' ? '🔴 Alta' : item.priority === 'medium' ? '🟡 Media' : '🟢 Baja'}
                                </span>
                                <span class="badge status-${item.status}">
                                    ${item.status === 'pending' ? '⏳ Pendiente' : item.status === 'in-progress' ? '🔄 En Proceso' : '✅ Resuelto'}
                                </span>
                            </div>
                            <div class="punchlist-actions">
                                <button class="btn-icon-sm edit-btn" data-id="${item.id}" aria-label="Editar">✏️</button>
                                <button class="btn-icon-sm delete-btn" data-id="${item.id}" aria-label="Eliminar">🗑️</button>
                            </div>
                        </div>
                        <div class="punchlist-text mt-2">${escapeHtml(item.text)}</div>
                        <div class="punchlist-meta mt-3">
                            ${item.assigned ? `<span class="meta-item">👤 ${escapeHtml(item.assigned)}</span>` : ''}
                            ${item.dueDate ? `<span class="meta-item">📅 ${formatters.date(item.dueDate)}</span>` : ''}
                            <span class="meta-item">🕒 Creado: ${formatters.date(item.createdAt, 'datetime')}</span>
                        </div>
                    </div>
                </div>
            `).join('');
            
            // Event listeners para botones
            container.querySelectorAll('.edit-btn').forEach(btn => {
                btn.addEventListener('click', () => editItem(parseInt(btn.dataset.id)));
            });
            container.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', () => deleteItem(parseInt(btn.dataset.id)));
            });
        }
        
        async function updateBadge() {
            const summary = await getPunchlistSummary();
            const badge = document.getElementById('punchlistBadge');
            if (badge) badge.textContent = summary.total;
        }
        
        function openModal(isEdit = false) {
            const modal = document.getElementById('punchlistModal');
            const modalTitle = document.getElementById('modalTitle');
            const statusGroup = document.getElementById('statusGroup');
            const deleteBtn = document.getElementById('modalDelete');
            
            if (isEdit) {
                modalTitle.textContent = '✏️ Editar observación';
                statusGroup.style.display = 'block';
                if (deleteBtn) deleteBtn.style.display = 'block';
            } else {
                modalTitle.textContent = '➕ Nueva observación';
                statusGroup.style.display = 'none';
                if (deleteBtn) deleteBtn.style.display = 'none';
                document.getElementById('modalStatus').value = 'pending';
            }
            
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }
        
        function closeModal() {
            document.getElementById('punchlistModal').style.display = 'none';
            document.body.style.overflow = '';
            editingId = null;
            clearModalForm();
        }
        
        function clearModalForm() {
            document.getElementById('modalCategory').value = 'electrical';
            document.getElementById('modalText').value = '';
            document.getElementById('modalPriority').value = 'medium';
            document.getElementById('modalAssigned').value = '';
            document.getElementById('modalDueDate').value = '';
            document.getElementById('modalStatus').value = 'pending';
        }
        
        async function editItem(id) {
            const item = currentItems.find(i => i.id === id);
            if (!item) return;
            
            editingId = id;
            document.getElementById('modalCategory').value = item.category;
            document.getElementById('modalText').value = item.text;
            document.getElementById('modalPriority').value = item.priority;
            document.getElementById('modalAssigned').value = item.assigned || '';
            document.getElementById('modalDueDate').value = item.dueDate || '';
            document.getElementById('modalStatus').value = item.status || 'pending';
            
            openModal(true);
        }
        
        async function deleteItem(id) {
            const confirmed = confirm('¿Eliminar esta observación permanentemente?');
            if (!confirmed) return;
            
            try {
                await deletePunchlistItem(id);
                await loadPunchlist();
                notifications.success('Observación eliminada');
                log.info('Observación eliminada', { id });
            } catch (error) {
                log.error('Error eliminando:', error);
                notifications.error('Error al eliminar');
            }
        }
        
        async function saveItem() {
            const category = document.getElementById('modalCategory').value;
            const text = document.getElementById('modalText').value.trim();
            const priority = document.getElementById('modalPriority').value;
            const assigned = document.getElementById('modalAssigned').value;
            const dueDate = document.getElementById('modalDueDate').value;
            const status = document.getElementById('modalStatus').value;
            
            if (!text) {
                notifications.warning('La descripción es obligatoria');
                return;
            }
            
            try {
                if (editingId) {
                    await updatePunchlistItem(editingId, {
                        category,
                        text,
                        priority,
                        assigned,
                        dueDate,
                        status
                    });
                    notifications.success('Observación actualizada');
                    log.info('Observación actualizada', { id: editingId });
                } else {
                    await addPunchlistItem({
                        category,
                        text,
                        priority,
                        assigned,
                        dueDate,
                        status: 'pending'
                    });
                    notifications.success('Observación agregada');
                    log.info('Observación agregada');
                }
                
                closeModal();
                await loadPunchlist();
            } catch (error) {
                log.error('Error guardando:', error);
                notifications.error('Error al guardar');
            }
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }
        
        // Verificar si viene de checklist con items pendientes
        function checkPendingItemsFromChecklist() {
            const urlParams = new URLSearchParams(window.location.search);
            const action = urlParams.get('action');
            const source = urlParams.get('source');
            const pendingItems = sessionStorage.getItem('pendingItems');
            
            if (action === 'add' && pendingItems) {
                const items = JSON.parse(pendingItems);
                if (items.length > 0) {
                    setTimeout(() => {
                        const firstItem = items[0];
                        const category = source === 'electrical' ? 'electrical' : 'instrumentation';
                        const text = `Pendiente de checklist: ${firstItem.item} (Norma: ${firstItem.norm})`;
                        
                        document.getElementById('modalCategory').value = category;
                        document.getElementById('modalText').value = text;
                        openModal(false);
                        
                        // Limpiar sessionStorage
                        sessionStorage.removeItem('pendingItems');
                    }, 500);
                }
            }
        }
        
        // Event listeners
        document.getElementById('addPunchlistBtn')?.addEventListener('click', () => {
            editingId = null;
            clearModalForm();
            openModal(false);
        });
        
        document.getElementById('modalCancel')?.addEventListener('click', closeModal);
        document.getElementById('modalSave')?.addEventListener('click', saveItem);
        document.getElementById('modalDelete')?.addEventListener('click', async () => {
            if (editingId && confirm('¿Eliminar permanentemente esta observación?')) {
                await deleteItem(editingId);
                closeModal();
            }
        });
        
        document.querySelectorAll('.modal-close').forEach(btn => {
            btn.addEventListener('click', closeModal);
        });
        
        document.getElementById('filterPriority')?.addEventListener('change', applyFilters);
        document.getElementById('filterStatus')?.addEventListener('change', applyFilters);
        document.getElementById('filterCategory')?.addEventListener('change', applyFilters);
        
        // Cerrar modal al hacer clic fuera
        window.addEventListener('click', (e) => {
            const modal = document.getElementById('punchlistModal');
            if (e.target === modal) closeModal();
        });
        
        initTheme();
        initSidebar();
        loadPunchlist();
        checkPendingItemsFromChecklist();
    </script>
</body>
</html>
