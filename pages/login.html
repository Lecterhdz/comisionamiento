<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Comisionamiento PWA</title>
    
    <link rel="stylesheet" href="/comisionamiento/css/core/variables.css">
    <link rel="stylesheet" href="/comisionamiento/css/core/reset.css">
    <link rel="stylesheet" href="/comisionamiento/css/core/utilities.css">
    <link rel="stylesheet" href="/comisionamiento/css/components/buttons.css">
    <link rel="stylesheet" href="/comisionamiento/css/components/cards.css">
    <link rel="stylesheet" href="/comisionamiento/css/components/forms.css">
    
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--bg-primary), var(--bg-secondary));
        }
        .login-container {
            max-width: 450px;
            width: 100%;
            margin: 1rem;
        }
        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .login-header .logo-icon {
            font-size: 3rem;
        }
        .login-header h1 {
            font-size: 1.75rem;
            margin-top: 0.5rem;
        }
        .alert-error {
            background: rgba(239,68,68,0.1);
            border-left: 3px solid #ef4444;
            padding: 0.75rem;
            border-radius: 0.5rem;
            margin-top: 1rem;
            color: #ef4444;
        }
        .w-100 {
            width: 100%;
        }
        .mt-3 {
            margin-top: 1rem;
        }
        .text-center {
            text-align: center;
        }
        .text-muted {
            color: var(--text-tertiary);
        }
        .info-text {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.875rem;
            color: var(--text-tertiary);
        }
        .form-group {
            margin-bottom: 1rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.25rem;
            font-weight: 500;
        }
        .form-input {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid var(--border-color);
            border-radius: 0.375rem;
            background: var(--bg-secondary);
            color: var(--text-primary);
        }
        .btn-primary {
            background: var(--primary-500);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            border: none;
            cursor: pointer;
            width: 100%;
        }
        .btn-primary:hover {
            background: var(--primary-600);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="card">
            <div class="card-body">
                <div class="login-header">
                    <div class="logo-icon">⚡</div>
                    <h1>Comisionamiento PWA</h1>
                    <p class="text-muted">Sistema de gestión de comisionamiento</p>
                </div>
                
                <!-- Solo formulario de contratista -->
                <div class="form-group">
                    <label>Usuario</label>
                    <input type="text" id="contratistaUser" class="form-input" placeholder="contratista" value="contratista">
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="contratistaPass" class="form-input" placeholder="••••••••" value="comisiona2024">
                </div>
                <button id="loginContratistaBtn" class="btn-primary">Ingresar</button>
                
                <div class="info-text">
                    <strong>Demo:</strong> usuario: contratista / contraseña: comisiona2024
                </div>
                
                <div id="errorMessage" class="alert-error" style="display: none;"></div>
            </div>
        </div>
        
        <!-- Enlace para proveedores (sin login) -->
        <div class="text-center mt-3">
            <p class="text-sm text-muted">
                ¿Eres proveedor? 
                <a href="/comisionamiento/pages/subcontractor.html" style="color: var(--primary-500);">Accede directamente al portal</a>
            </p>
        </div>
    </div>
    
    <script>
        // Credenciales
        const USUARIO_CORRECTO = 'contratista';
        const PASSWORD_CORRECTO = 'comisiona2024';
        
        function doLogin(userData) {
            localStorage.setItem('user_session', JSON.stringify(userData));
        }
        
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => errorDiv.style.display = 'none', 3000);
        }
        
        document.getElementById('loginContratistaBtn').addEventListener('click', () => {
            const usuario = document.getElementById('contratistaUser').value.trim();
            const password = document.getElementById('contratistaPass').value.trim();
            
            if (!usuario || !password) {
                showError('Ingrese usuario y contraseña');
                return;
            }
            
            if (usuario === USUARIO_CORRECTO && password === PASSWORD_CORRECTO) {
                doLogin({
                    id: usuario,
                    nombre: 'Contratista General',
                    rol: 'contratista',
                    loginTime: new Date().toISOString()
                });
                window.location.href = '/comisionamiento/index.html';
            } else {
                showError('Usuario o contraseña incorrectos');
            }
        });
        
        // Si ya hay sesión de contratista, redirigir
        const session = localStorage.getItem('user_session');
        if (session) {
            try {
                const user = JSON.parse(session);
                if (user.rol === 'contratista') {
                    window.location.href = '/comisionamiento/index.html';
                }
            } catch(e) {}
        }
        
        // Tema
        const savedTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
</body>
</html>
