<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0a0c12" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
    <title>Checklist Instrumentación - Comisionamiento PWA</title>
    
    <!-- CSS Core -->
    <link rel="stylesheet" href="/comisionamiento/css/core/variables.css">
    <link rel="stylesheet" href="/comisionamiento/css/core/reset.css">
    <link rel="stylesheet" href="/comisionamiento/css/core/utilities.css">
    
    <!-- CSS Layout -->
    <link rel="stylesheet" href="/comisionamiento/css/layout/grid.css">
    <link rel="stylesheet" href="/comisionamiento/css/layout/sidebar.css">
    <link rel="stylesheet" href="/comisionamiento/css/layout/header.css">
    
    <!-- CSS Components -->
    <link rel="stylesheet" href="/comisionamiento/css/components/buttons.css">
    <link rel="stylesheet" href="/comisionamiento/css/components/cards.css">
    <link rel="stylesheet" href="/comisionamiento/css/components/forms.css">
    <link rel="stylesheet" href="/comisionamiento/css/components/modals.css">
    <link rel="stylesheet" href="/comisionamiento/css/components/animations.css">
    
    <!-- CSS Features -->
    <link rel="stylesheet" href="/comisionamiento/css/checklist.css">
</head>
<body>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <a href="/comisionamiento/index.html" class="logo">
                <span class="logo-icon">⚡</span>
                <span class="logo-text">Comisiona</span>
            </a>
            <button class="sidebar-close" id="sidebarClose" aria-label="Cerrar menú">✕</button>
        </div>
        
        <nav class="sidebar-nav">
            <a href="/comisionamiento/index.html" class="nav-item">
                <span class="nav-icon">📊</span>
                <span class="nav-text">Dashboard</span>
            </a>
            <a href="/comisionamiento/pages/checklist-electrical.html" class="nav-item">
                <span class="nav-icon">⚡</span>
                <span class="nav-text">Checklist Eléctrico</span>
            </a>
            <a href="/comisionamiento/pages/checklist-instrumentation.html" class="nav-item active">
                <span class="nav-icon">📟</span>
                <span class="nav-text">Instrumentación</span>
            </a>
            <a href="/comisionamiento/pages/punchlist.html" class="nav-item">
                <span class="nav-icon">📋</span>
                <span class="nav-text">Punchlist</span>
                <span class="badge" id="punchlistBadge">0</span>
            </a>
            <a href="/comisionamiento/pages/reports.html" class="nav-item">
                <span class="nav-icon">📄</span>
                <span class="nav-text">Reportes</span>
            </a>
        </nav>
        
        <div class="sidebar-footer">
            <button id="themeToggle" class="theme-toggle-btn">
                <span class="theme-icon-dark">🌙</span>
                <span class="theme-icon-light">☀️</span>
                <span class="theme-text">Modo oscuro</span>
            </button>
        </div>
    </aside>
    
    <main class="main-content">
        <header class="top-bar">
            <button class="hamburger" id="hamburger" aria-label="Abrir menú">
                <span></span><span></span><span></span>
            </button>
            <h1 class="page-title">Checklist Instrumentación</h1>
            <div class="top-bar-actions">
                <button id="themeToggleMobile" class="mobile-theme-toggle" aria-label="Cambiar tema">🌙</button>
                <button id="exportBtn" class="btn-icon" aria-label="Exportar">📎</button>
            </div>
        </header>
        
        <div class="content-container">
            <!-- Barra de progreso global -->
            <div class="card mb-4">
                <div class="card-body">
                    <div class="global-progress">
                        <div class="progress-label">
                            <span>Progreso general</span>
                            <span id="globalProgressText">0%</span>
                        </div>
                        <div class="progress-bar-container">
                            <div class="progress-bar-fill" id="globalProgressFill" style="width: 0%"></div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Checklist agrupado por sección -->
            <div id="checklistContainer" class="checklist-container"></div>
            
            <!-- Botones de acción -->
            <div class="checklist-actions mt-4">
                <button id="expandAllBtn" class="btn btn-outline">
                    <span>📂</span> Expandir todo
                </button>
                <button id="collapseAllBtn" class="btn btn-outline">
                    <span>📁</span> Colapsar todo
                </button>
                <button id="addObservationBtn" class="btn btn-primary">
                    <span>➕</span> Agregar observación
                </button>
            </div>
        </div>
    </main>
    
    <script type="module">
        import { initTheme, themeManager } from '/comisionamiento/js/core/theme.js';
        import { initSidebar } from '/comisionamiento/js/components/sidebar.js';
        import { initStorage, getChecklistItems, saveChecklistItem } from '/comisionamiento/js/core/storage.js';
        import { instrumentationChecklistItems } from '/comisionamiento/js/features/checklist/items-data.js';
        import { renderChecklist, updateGlobalProgress } from '/comisionamiento/js/components/checklist-item.js';
        import { notifications } from '/comisionamiento/js/services/notifications.js';
        import { logger } from '/comisionamiento/js/core/logger.js';
        
        let currentItems = [];
        const log = logger.setContext('ChecklistInstrumentation');
        
        async function loadChecklist() {
            try {
                await initStorage();
                
                const savedItems = await getChecklistItems('instrumentation');
                
                currentItems = instrumentationChecklistItems.map(item => {
                    const saved = savedItems.find(s => s.itemId === item.id);
                    return {
                        ...item,
                        completed: saved?.completed || false,
                        notes: saved?.notes || ''
                    };
                });
                
                renderChecklist('checklistContainer', currentItems, 'instrumentation', onItemChange);
                updateGlobalProgress(currentItems);
                
                log.info('Checklist instrumentación cargado', { total: currentItems.length });
            } catch (error) {
                log.error('Error cargando checklist:', error);
                notifications.error('Error al cargar el checklist');
            }
        }
        
        async function onItemChange(itemId, completed, notes) {
            try {
                await saveChecklistItem('instrumentation', itemId, completed, notes);
                
                const index = currentItems.findIndex(i => i.id === itemId);
                if (index !== -1) {
                    currentItems[index].completed = completed;
                    currentItems[index].notes = notes;
                }
                
                updateGlobalProgress(currentItems);
                
                if (completed) {
                    notifications.success('Item completado');
                }
                
                log.debug('Item actualizado', { itemId, completed });
            } catch (error) {
                log.error('Error guardando item:', error);
                notifications.error('Error al guardar');
            }
        }
        
        document.getElementById('expandAllBtn')?.addEventListener('click', () => {
            document.querySelectorAll('.checklist-section').forEach(section => {
                section.classList.add('expanded');
            });
            notifications.info('Todos los grupos expandidos');
        });
        
        document.getElementById('collapseAllBtn')?.addEventListener('click', () => {
            document.querySelectorAll('.checklist-section').forEach(section => {
                section.classList.remove('expanded');
            });
            notifications.info('Todos los grupos colapsados');
        });
        
        document.getElementById('addObservationBtn')?.addEventListener('click', () => {
            const pendingItems = currentItems.filter(i => !i.completed);
            if (pendingItems.length === 0) {
                notifications.warning('No hay items pendientes para agregar');
                return;
            }
            
            sessionStorage.setItem('pendingItems', JSON.stringify(pendingItems));
            window.location.href = '/comisionamiento/pages/punchlist.html?action=add&source=instrumentation';
        });
        
        document.getElementById('exportBtn')?.addEventListener('click', () => {
            notifications.info('Exportación disponible próximamente');
        });
        
        async function updateBadge() {
            const { getPunchlistSummary } = await import('/comisionamiento/js/core/storage.js');
            const summary = await getPunchlistSummary();
            const badge = document.getElementById('punchlistBadge');
            if (badge) badge.textContent = summary.total;
        }
        
        initTheme();
        initSidebar();
        loadChecklist();
        updateBadge();
    </script>
</body>
</html>
